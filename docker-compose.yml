version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://backend:8000

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=file:/app/data/data.db
      - OPENCODE_HOST=opencode
      - OPENCODE_PORT=4096
    volumes:
      - backend-data:/app/data
    depends_on:
      - opencode

  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    command: serve --port 4096 --hostname 0.0.0.0
    ports:
      - "4096:4096"
    volumes:
      - opencode-workspace:/workspace

volumes:
  backend-data:
  opencode-workspace:
